<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix Maamu - Pro Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.3/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/9.1.3/firebase-database.js";

        // Firebase Configuration
        const firebaseConfig = { databaseURL: "https://fixmamu-97dd2-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let cart = {};
        let bookingType = "Instant";

        // 🎙 PROFESSIONAL KANNADA VOICE (Refined)
        window.speak = (text) => {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            const knVoice = voices.find(v => v.lang === 'kn-IN' && v.name.includes('Google')) || voices.find(v => v.lang === 'kn-IN');
            
            if (knVoice) msg.voice = knVoice;
            msg.lang = "kn-IN";
            msg.pitch = 1.0;
            msg.rate = 0.88; 
            window.speechSynthesis.speak(msg);
        };

        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

        // 🛒 CART LOGIC
        window.addService = (name, hrs, price, isIncrement = false) => {
            if (!cart[name]) cart[name] = { qty: hrs, price: price };
            else isIncrement ? cart[name].qty += 1 : cart[name].qty = hrs;
            
            speak(name + " ಆಯ್ಕೆ ಮಾಡಲಾಗಿದೆ.");
            renderCart();
        };

        window.removeFromCart = (name) => {
            delete cart[name];
            speak(name + " ತೆಗೆದುಹಾಕಲಾಗಿದೆ.");
            renderCart();
        };

        function renderCart() {
            let t = 0; let html = "";
            Object.keys(cart).forEach(k => {
                let amt = cart[k].qty * cart[k].price; t += amt;
                html += `
                <div class="flex justify-between items-center bg-gray-900/80 p-3 rounded-2xl mb-2 border border-white/5 shadow-sm">
                    <div>
                        <p class="text-[10px] font-black text-yellow-500 uppercase italic">${k}</p>
                        <p class="text-[9px] text-gray-400 font-bold">${cart[k].qty} ಗಂಟೆ x ₹${cart[k].price} = ₹${amt}</p>
                    </div>
                    <button onclick="removeFromCart('${k}')" class="text-red-500 p-2 active:scale-75 transition-all"><i class="fa fa-trash-alt"></i></button>
                </div>`;
            });
            cartItems.innerHTML = html;
            total.innerText = "₹" + t;
            cartSection.style.display = t > 0 ? "block" : "none";
        }

        // 📅 TOGGLE LOGIC
        window.setType = (type) => {
            bookingType = type;
            instBtn.className = type === 'Instant' ? 'flex-1 bg-yellow-500 text-black py-4 rounded-2xl font-black italic shadow-lg shadow-yellow-500/20 active:scale-95 transition-all' : 'flex-1 bg-gray-900 text-gray-500 py-4 rounded-2xl font-black italic';
            schBtn.className = type === 'Schedule' ? 'flex-1 bg-yellow-500 text-black py-4 rounded-2xl font-black italic shadow-lg shadow-yellow-500/20 active:scale-95 transition-all' : 'flex-1 bg-gray-900 text-gray-500 py-4 rounded-2xl font-black italic';
            scheduleBox.classList.toggle('hidden', type !== 'Schedule');
            speak(type === "Instant" ? "ತಕ್ಷಣದ ಬುಕಿಂಗ್" : "ಶೆಡ್ಯೂಲ್ ಬುಕಿಂಗ್");
        };

        // 📦 LOAD DATA
        onValue(ref(db, "services"), snap => {
            let sHtml = "";
            snap.forEach(s => {
                let d = s.val();
                sHtml += `
                <div class="bg-gray-900 p-5 mb-4 rounded-[30px] border border-gray-800 shadow-xl">
                    <b class="text-yellow-400 uppercase text-xs italic tracking-wider">${d.name}</b>
                    <div class="grid grid-cols-4 gap-2 mt-3">
                        <button onclick="addService('${d.name}',1,${d.price})" class="bg-black/40 p-2 rounded-2xl border border-white/5 active:bg-yellow-500 active:text-black">
                            <span class="block text-[10px] font-black">1h</span>
                            <span class="block text-[8px] text-gray-500">₹${d.price}</span>
                        </button>
                        <button onclick="addService('${d.name}',2,${d.price})" class="bg-black/40 p-2 rounded-2xl border border-white/5 active:bg-yellow-500 active:text-black">
                            <span class="block text-[10px] font-black">2h</span>
                            <span class="block text-[8px] text-gray-500">₹${d.price*2}</span>
                        </button>
                        <button onclick="addService('${d.name}',3,${d.price})" class="bg-black/40 p-2 rounded-2xl border border-white/5 active:bg-yellow-500 active:text-black">
                            <span class="block text-[10px] font-black">3h</span>
                            <span class="block text-[8px] text-gray-500">₹${d.price*3}</span>
                        </button>
                        <button onclick="addService('${d.name}',1,${d.price}, true)" class="bg-yellow-500 text-black rounded-2xl flex flex-col items-center justify-center active:scale-90 transition-all">
                            <i class="fa fa-plus text-[10px]"></i>
                            <span class="text-[7px] font-black uppercase">+1h</span>
                        </button>
                    </div>
                </div>`;
            });
            servicesList.innerHTML = sHtml;
        });

        onValue(ref(db, "zones"), snap => {
            let zOpt = '<option value="">Select Area / Zone</option>';
            snap.forEach(z => zOpt += `<option>${z.val().name}</option>`);
            zoneSelect.innerHTML = zOpt;
        });

        // 🚀 FINAL BOOKING & PROFESSIONAL WHATSAPP
        window.book = () => {
            const name = nameI.value, phone = phoneI.value, addr = addrI.value, land = landI.value, zone = zoneSelect.value;
            if(!name || !phone || !addr || !zone || Object.keys(cart).length === 0) {
                speak("ದಯವಿಟ್ಟು ಎಲ್ಲಾ ವಿವರಗಳನ್ನು ಭರ್ತಿ ಮಾಡಿ");
                return alert("Fill all details!");
            }

            let sList = ""; let tAmt = 0;
            Object.keys(cart).forEach(k => { 
                sList += `${k} (${cart[k].qty} ಗಂಟೆ), `; 
                tAmt += cart[k].qty * cart[k].price; 
            });

            const bID = "FIX-" + Date.now();
            const timeInfo = bookingType === "Schedule" ? `${sDate.value} ${sTime.value}` : "Instant";

            push(ref(db, "bookings"), { id: bID, customer: name, phone, address: addr, landmark: land, zone, services: sList, amount: tAmt, type: bookingType, status: "Pending" }).then(() => {
                let waMsg = `*FIX MAAMU - ಹೊಸ ಬುಕಿಂಗ್!*%0A------------------%0A*ID:* ${bID}%0A*ಹೆಸರು:* ${name}%0A*ಫೋನ್:* ${phone}%0A*ವಿಳಾಸ:* ${addr}%0A*ಲ್ಯಾಂಡ್‌ಮಾರ್ಕ್:* ${land}%0A*ಏರಿಯಾ:* ${zone}%0A*ಸೇವೆ:* ${sList}%0A*ಮೊತ್ತ:* ₹${tAmt}%0A*ಸಮಯ:* ${timeInfo}%0A*ಪಾವತಿ:* Cash`;
                
                window.open(`https://wa.me/919108151310?text=${waMsg}`);
                location.reload();
            });
        };
    </script>
    <style>
        ::-webkit-scrollbar { display: none; }
        input:focus, select:focus { border-color: #eab308 !important; }
    </style>
</head>
<body class="bg-black text-white p-4 font-sans italic pb-48">

    <div class="flex justify-between items-center mb-8 pt-4">
        <div>
            <h1 class="text-3xl font-black text-yellow-500 uppercase leading-none tracking-tighter">Fix Maamu</h1>
            <p class="text-[10px] text-white opacity-60 uppercase tracking-[0.2em] mt-1 font-bold italic">Help in 20 Minutes</p>
        </div>
        <button onclick="speak('ನಮಸ್ಕಾರ, ಫಿಕ್ಸ್ ಮಾಮು ಆಪ್‌ಗೆ ಸ್ವಾಗತ. ನಿಮಗೆ ಯಾವ ಸೇವೆ ಬೇಕು?')" class="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center shadow-lg shadow-red-600/20 active:scale-90 transition-all border border-white/10">
            <i class="fa fa-microphone text-white"></i>
        </button>
    </div>

    <div class="flex gap-2 mb-6 bg-gray-900 p-1.5 rounded-[25px] border border-white/5">
        <button id="instBtn" onclick="setType('Instant')" class="flex-1 bg-yellow-500 text-black py-4 rounded-2xl font-black text-xs uppercase shadow-lg shadow-yellow-500/20 transition-all">Instant</button>
        <button id="schBtn" onclick="setType('Schedule')" class="flex-1 text-gray-500 py-4 rounded-2xl font-black text-xs uppercase transition-all">Schedule</button>
    </div>

    <div id="scheduleBox" class="hidden mb-6 grid grid-cols-2 gap-2 animate-pulse">
        <input type="date" id="sDate" class="bg-gray-900 p-4 rounded-2xl text-xs text-white border border-gray-800 outline-none">
        <input type="time" id="sTime" class="bg-gray-900 p-4 rounded-2xl text-xs text-white border border-gray-800 outline-none">
    </div>

    <div class="space-y-3 mb-10">
        <select id="zoneSelect" class="w-full bg-gray-900 p-4 rounded-2xl text-xs text-white border border-gray-800 outline-none appearance-none font-bold italic"></select>
        <input id="nameI" placeholder="Full Name" class="w-full bg-gray-900 p-4 rounded-2xl text-xs text-white border border-gray-800 outline-none bg-black/20">
        <input id="phoneI" type="number" placeholder="Mobile Number" class="w-full bg-gray-900 p-4 rounded-2xl text-xs text-white border border-gray-800 outline-none bg-black/20">
        <input id="addrI" placeholder="House Address" class="w-full bg-gray-900 p-4 rounded-2xl text-xs text-white border border-gray-800 outline-none bg-black/20">
        <input id="landI" placeholder="Landmark" class="w-full bg-gray-900 p-4 rounded-2xl text-xs text-white border border-gray-800 outline-none bg-black/20">
    </div>

    <p class="text-[9px] font-black uppercase text-gray-600 mb-4 ml-2 tracking-[0.2em]">Available Services</p>
    <div id="servicesList"></div>

    <div id="cartSection" class="hidden mt-10 mb-6 bg-black/40 p-4 rounded-[30px] border border-dashed border-gray-800">
        <p class="text-[9px] font-black uppercase text-yellow-600/50 mb-4 ml-1 tracking-widest">Selected Services (Tap trash to remove)</p>
        <div id="cartItems"></div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-black/80 backdrop-blur-xl p-6 border-t border-white/5 flex justify-between items-center z-50">
        <div>
            <p class="text-[8px] uppercase text-gray-500 font-black mb-1 tracking-tighter">Total Amount</p>
            <h2 id="total" class="text-3xl font-black text-green-500 leading-none tracking-tighter">₹0</h2>
        </div>
        <button onclick="book()" class="bg-yellow-500 text-black px-12 py-5 rounded-[22px] font-black uppercase text-xs italic shadow-xl shadow-yellow-500/20 active:scale-95 transition-all">Book Now</button>
    </div>

</body>
</html>
