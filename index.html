<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix Maamu - User App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.3/firebase-app.js";
        import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/9.1.3/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCdSWfgK4M_xSd3hb-1BLjF13MG8RrOFXg",
            databaseURL: "https://fixmamu-97dd2-default-rtdb.firebaseio.com",
            appId: "1:838658618211:web:7aa7dbf5c4e3ede11c9956"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let cart = {}; 
        let walletBalance = 0;
        let bookingType = "Instant";
        let adminWhatsApp = "919008272911";

        window.speakKND = (text, callback) => {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'kn-IN';
            msg.rate = 0.85; 
            msg.onend = () => { if (callback) callback(); };
            window.speechSynthesis.speak(msg);
        };

        window.setBookingType = (type) => {
            bookingType = type;
            document.getElementById('instBtn').className = type === 'Instant' ? "flex-1 bg-yellow-500 text-black font-black py-4 rounded-2xl italic uppercase text-xs" : "flex-1 bg-slate-800 text-white font-black py-4 rounded-2xl italic uppercase text-xs";
            document.getElementById('schBtn').className = type === 'Schedule' ? "flex-1 bg-yellow-500 text-black font-black py-4 rounded-2xl italic uppercase text-xs" : "flex-1 bg-slate-800 text-white font-black py-4 rounded-2xl italic uppercase text-xs";
            document.getElementById('scheduleFields').classList.toggle('hidden', type === 'Instant');
            speakKND(type === 'Instant' ? "ತಕ್ಷಣದ ಬುಕಿಂಗ್ ಆರಿಸಲಾಗಿದೆ." : "ಶೆಡ್ಯೂಲ್ ಬುಕಿಂಗ್ ಆರಿಸಲಾಗಿದೆ.");
        };

        window.updateSelection = (serviceName, price, btnId, qty) => {
            cart[serviceName] = { label: qty + " ಗಂಟೆ", price: parseInt(price), qty: qty, base: (price/qty) };
            document.querySelectorAll(`[data-serv="${serviceName}"]`).forEach(b => b.classList.replace('bg-blue-600', 'bg-slate-800'));
            document.getElementById(btnId).classList.replace('bg-slate-800', 'bg-blue-600');
            document.getElementById(`qty_${serviceName}`).innerText = qty;
            speakKND(`${serviceName}, ${qty} ಗಂಟೆ, ${price} ರೂಪಾಯಿ.`);
            updateTotal();
        };

        window.changeHours = (serviceName, basePrice, action) => {
            if (!cart[serviceName]) cart[serviceName] = { label: "1 ಗಂಟೆ", price: basePrice, qty: 1, base: basePrice };
            if (action === 'plus') cart[serviceName].qty += 1;
            else if (action === 'minus' && cart[serviceName].qty > 1) cart[serviceName].qty -= 1;
            cart[serviceName].price = cart[serviceName].qty * cart[serviceName].base;
            cart[serviceName].label = `${cart[serviceName].qty} ಗಂಟೆ`;
            document.getElementById(`qty_${serviceName}`).innerText = cart[serviceName].qty;
            speakKND(`${cart[serviceName].qty} ಗಂಟೆ, ${cart[serviceName].price} ರೂಪಾಯಿ.`);
            updateTotal();
        };

        const updateTotal = () => {
            let sub = 0;
            for (let k in cart) sub += cart[k].price;
            document.getElementById('totalDisp').innerText = "Total: ₹" + (sub - walletBalance);
        };

        window.startBooking = (method) => {
            const name = document.getElementById('uName').value;
            const address = document.getElementById('uAddress').value;
            const landmark = document.getElementById('uLandmark').value;
            const zone = document.getElementById('zoneSelect').value;
            
            if(!name || !address || !landmark || !zone || Object.keys(cart).length === 0) { 
                alert("ಎಲ್ಲ ವಿವರಗಳನ್ನು (ಹೆಸರು, ವಿಳಾಸ, ಲ್ಯಾಂಡ್‌ಮಾರ್ಕ್) ಭರ್ತಿ ಮಾಡಿ!"); 
                return; 
            }
            
            let services = ""; let total = 0;
            for (let k in cart) { services += `${k} (${cart[k].label}), `; total += cart[k].price; }
            
            const bID = "FIX-" + Date.now();
            const time = bookingType === 'Schedule' ? document.getElementById('bDate').value + " " + document.getElementById('bTime').value : "Instant";
            
            // Firebase ಗೆ ಮಾಹಿತಿ ರವಾನೆ
            update(ref(db, 'bookings/' + bID), { 
                customer: name, address: address, landmark: landmark, zone: zone, 
                services: services, amount: total, payment: method, timing: time, status: "Confirmed" 
            });

            const msg = `*FIX MAAMU - ಹೊಸ ಬುಕಿಂಗ್!*%0A------------------%0A*ID:* ${bID}%0A*ಹೆಸರು:* ${name}%0A*ವಿಳಾಸ:* ${address}%0A*ಲ್ಯಾಂಡ್‌ಮಾರ್ಕ್:* ${landmark}%0A*ಏರಿಯಾ:* ${zone}%0A*ಸೇವೆ:* ${services}%0A*ಮೊತ್ತ:* ₹${total}%0A*ಸಮಯ:* ${time}`;
            
            speakKND(`ಬುಕಿಂಗ್ ಯಶಸ್ವಿಯಾಗಿದೆ. ವಾಟ್ಸಾಪ್ ಸಂದೇಶ ಕಳುಹಿಸಲಾಗುತ್ತಿದೆ.`, () => {
                window.open(`https://wa.me/${adminWhatsApp}?text=${msg}`, '_blank');
                location.reload();
            });
        };

        onValue(ref(db, 'services'), (snapshot) => {
            let h = '';
            Object.values(snapshot.val() || {}).forEach((s, idx) => {
                h += `<div class="bg-[#0f172a] p-4 rounded-[25px] border border-slate-800 mb-4">
                    <h3 class="text-white font-black italic uppercase text-xs mb-3">${s.name}</h3>
                    <div class="grid grid-cols-4 gap-2">
                        <button id="b_${idx}_1" data-serv="${s.name}" onclick="updateSelection('${s.name}',${s.prices['1h']},'b_${idx}_1',1)" class="bg-slate-800 py-2 rounded-xl text-[9px] text-white font-bold">1h ₹${s.prices['1h']}</button>
                        <button id="b_${idx}_2" data-serv="${s.name}" onclick="updateSelection('${s.name}',${s.prices['2h']},'b_${idx}_2',2)" class="bg-slate-800 py-2 rounded-xl text-[9px] text-white font-bold">2h ₹${s.prices['2h']}</button>
                        <button id="b_${idx}_3" data-serv="${s.name}" onclick="updateSelection('${s.name}',${s.prices['3h']},'b_${idx}_3',3)" class="bg-slate-800 py-2 rounded-xl text-[9px] text-white font-bold">3h ₹${s.prices['3h']}</button>
                        <div class="flex items-center bg-slate-900 rounded-xl px-1 border border-slate-700">
                            <button onclick="changeHours('${s.name}',${s.prices['1h']},'minus')" class="flex-1 text-white font-bold">-</button>
                            <span id="qty_${s.name}" class="px-1 text-xs text-yellow-500 font-black">0</span>
                            <button onclick="changeHours('${s.name}',${s.prices['1h']},'plus')" class="flex-1 text-yellow-500 font-bold">+</button>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('serviceGrid').innerHTML = h;
        });

        onValue(ref(db, 'zones'), (snap) => {
            let z = '<option value="">ನಿಮ್ಮ ಏರಿಯಾ ಆರಿಸಿ</option>';
            Object.values(snap.val() || {}).forEach(v => z += `<option value="${v.name}">${v.name}</option>`);
            document.getElementById('zoneSelect').innerHTML = z;
        });
    </script>
</head>
<body class="bg-black p-5 max-w-md mx-auto italic text-white">

    <div class="mb-6">
        <h1 class="text-4xl font-black italic text-yellow-500 leading-none">FIX ಮಾಮು</h1>
        <p class="text-yellow-500/80 text-[11px] font-bold mt-1 italic">​"Help ಬೇಕಾ? ಕೆಲಸ ಮಾಮುದು, ಆರಾಮ ನಿಮ್ಮದು!" 
            HOUSE HELP YOUR DOOR IN 10MINUTES </p>
    </div>

    <div class="flex gap-3 mb-6">
        <button id="instBtn" onclick="setBookingType('Instant')" class="flex-1 bg-yellow-500 text-black font-black py-4 rounded-2xl uppercase text-[10px]">Instant</button>
        <button id="schBtn" onclick="setBookingType('Schedule')" class="flex-1 bg-slate-800 text-white font-black py-4 rounded-2xl uppercase text-[10px]">Schedule</button>
    </div>

    <div id="scheduleFields" class="hidden grid grid-cols-2 gap-3 mb-6">
        <input id="bDate" type="date" class="bg-[#0f172a] border border-slate-800 p-4 rounded-2xl text-xs outline-none">
        <input id="bTime" type="time" class="bg-[#0f172a] border border-slate-800 p-4 rounded-2xl text-xs outline-none">
    </div>

    <div class="space-y-4 mb-8">
        <select id="zoneSelect" class="w-full bg-[#0f172a] border border-slate-800 p-4 rounded-2xl text-yellow-500 font-bold outline-none"></select>
        <input id="uName" type="text" placeholder="ನಿಮ್ಮ ಹೆಸರು (Name)" class="w-full bg-[#0f172a] border border-slate-800 p-4 rounded-2xl text-white font-bold outline-none">
        <input id="uAddress" type="text" placeholder="ಪೂರ್ತಿ ವಿಳಾಸ (Full Address)" class="w-full bg-[#0f172a] border border-slate-800 p-4 rounded-2xl text-white font-bold outline-none">
        <input id="uLandmark" type="text" placeholder="ಹತ್ತಿರದ ಗುರುತು (Near Landmark)" class="w-full bg-[#0f172a] border border-slate-800 p-4 rounded-2xl text-white font-bold outline-none">
    </div>

    <div id="serviceGrid"></div>

    <div id="payModal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center p-6 z-[100]">
        <div class="bg-slate-900 p-8 rounded-[40px] border border-slate-800 w-full text-center">
            <h2 class="text-xl font-black mb-6 uppercase">Payment</h2>
            <button onclick="startBooking('Cash')" class="w-full bg-slate-800 py-5 rounded-2xl font-black mb-4 uppercase">Cash</button>
            <button onclick="startBooking('Online')" class="w-full bg-green-600 py-5 rounded-2xl font-black mb-4 uppercase">Online (UPI)</button>
            <button onclick="document.getElementById('payModal').classList.add('hidden')" class="text-slate-500 text-xs mt-2">CLOSE</button>
        </div>
    </div>

    <div class="h-32"></div>
    <div class="fixed bottom-0 left-0 w-full p-6 bg-black/95 border-t border-slate-900 flex justify-between items-center rounded-t-[40px] backdrop-blur-md">
        <p id="totalDisp" class="text-2xl font-black italic tracking-tighter">Total: ₹0</p>
        <button onclick="document.getElementById('payModal').classList.remove('hidden')" class="bg-yellow-500 text-black font-black px-12 py-4 rounded-2xl uppercase italic">BOOK NOW</button>
    </div>
</body>
</html>
